<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Escala Easy VIBRA</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#020813">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Escala Easy">
  <!-- Material Icons & JetBrains Mono / Inter Fonts -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined|Material+Icons+Round|Material+Icons+Sharp&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN for guaranteed perfect styling and zero build-time configuration failures -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            jetfuel: {
              dark: '#020813',
              card: '#071426',
              border: '#10213b',
              green: '#10b981',
              success: '#10b981',
              warning: '#f59e0b',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#020813] light-theme">
  <app-root></app-root>
  <script>
    // Clean up service workers and local caches to prevent blank screen due to stale cached index.html referencing deleted bundles
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(registrations => {
        for (const registration of registrations) {
          registration.unregister().then(unregistered => {
            if (unregistered) console.log('Stale ServiceWorker successfully unregistered.');
          });
        }
      }).catch(err => console.warn('Error fetching service worker registrations:', err));
    }
    if ('caches' in window) {
      caches.keys().then(keys => {
        return Promise.all(keys.map(key => caches.delete(key)));
      }).then(() => {
        console.log('All application caches cleared successfully.');
      }).catch(err => console.warn('Error clearing caches:', err));
    }
  </script>
</body>
</html>
